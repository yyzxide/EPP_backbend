server:
  port: 8080

spring:
  application:
    name: epp-backend
  datasource:
    url: jdbc:mysql://${MYSQL_HOST:localhost}:3306/epp_db?useUnicode=true&characterEncoding=utf-8&useSSL=false&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true
    username: ${MYSQL_USER:root}
    password: ${MYSQL_PWD:root}
    driver-class-name: com.mysql.cj.jdbc.Driver
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
      password: ${REDIS_PWD:}
      database: 0
  kafka:
    bootstrap-servers: ${KAFKA_HOST:localhost}:9092
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.apache.kafka.common.serialization.StringSerializer
      acks: 1
    consumer:
      group-id: epp-backend-group
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      auto-offset-reset: earliest

epp:
  jwt:
    secret: epp-360-security-super-secret-key-must-be-at-least-256-bits-long
    expiration: 86400000 # 24 hours in milliseconds
  kafka:
    topic:
      heartbeat: epp.heartbeat
      seccheck: epp.seccheck

# Actuator + Prometheus 监控配置
# 访问 http://localhost:8080/actuator/prometheus 即可拉取指标
# Grafana 配置 Prometheus 数据源后即可看图
management:
  endpoints:
    web:
      exposure:
        include: health,prometheus,info,metrics
  metrics:
    tags:
      application: ${spring.application.name}

mybatis-plus:
  configuration:
    map-underscore-to-camel-case: true
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl
  global-config:
    db-config:
      id-type: auto
