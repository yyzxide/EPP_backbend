server:
  port: 8080

spring:
  application:
    name: epp-backend
  datasource:
    url: jdbc:mysql://${MYSQL_HOST:localhost}:3306/epp_db?useUnicode=true&characterEncoding=utf-8&useSSL=false&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true
    username: ${MYSQL_USER:root}
    password: ${MYSQL_PWD:root}
    driver-class-name: com.mysql.cj.jdbc.Driver
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
      password: ${REDIS_PWD:}
      database: 0
  kafka:
    bootstrap-servers: ${KAFKA_BOOTSTRAP_SERVERS:localhost:9092}
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.apache.kafka.common.serialization.StringSerializer
      acks: 1
    consumer:
      group-id: epp-backend-group
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      auto-offset-reset: earliest
      max-poll-records: 50
  ai:
    openai:
      api-key: ${AI_API_KEY:your-api-key-here}
      base-url: ${AI_BASE_URL:https://api.deepseek.com}
      chat:
        options:
          model: ${AI_MODEL:deepseek-chat}

epp:
  netty:
    port: ${NETTY_PORT:8090}
  jwt:
    secret: ${EPP_JWT_SECRET:change-this-in-production-please-use-a-random-32-byte-secret}
    expiration: 86400000 # 24 hours in milliseconds
  admin:
    token: ${EPP_ADMIN_TOKEN:}
  kafka:
    topic:
      heartbeat: epp.heartbeat
      seccheck: epp.seccheck

# Actuator + Prometheus 监控配置
# 访问 http://localhost:8080/actuator/prometheus 即可拉取指标
# Grafana 配置 Prometheus 数据源后即可看图
management:
  endpoints:
    web:
      exposure:
        include: health,prometheus,info,metrics
  metrics:
    tags:
      application: ${spring.application.name}

mybatis-plus:
  configuration:
    map-underscore-to-camel-case: true
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl
  global-config:
    db-config:
      id-type: auto
